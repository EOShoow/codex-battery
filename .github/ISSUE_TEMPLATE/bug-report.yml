name: Bug report
description: Report a bug in Codex Battery.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: "The menu bar indicator shows ..., but I expected ..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Codex Battery
        2. Click Refresh
        3. See ...
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Codex Battery version
      placeholder: "0.1.16"
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.x / 14.x ..."
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag screenshots here if useful. Please hide personal information.
    validations:
      required: false
